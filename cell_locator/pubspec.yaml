name: cell_locator
description: Offline cellular tower location tracker - works like a train location finder
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Native channel communication
  plugin_platform_interface: ^2.1.7
  
  # Database
  sqflite: ^2.3.0
  path: ^1.9.0
  
  # Maps (online)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Networking & connectivity
  connectivity_plus: ^5.0.2
  http: ^1.1.0
  
  # Permissions
  permission_handler: ^11.3.0
  
  # State management
  provider: ^6.1.1
  
  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  geolocator: ^11.0.0
  
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/cell_database.json
    - assets/india_cells.json
